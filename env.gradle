// Script para cargar variables de entorno desde el archivo .env
def envFile = file('.env')
def envVars = [:]

if (envFile.exists()) {
    envFile.readLines().each { line ->
        if (line.trim() && !line.startsWith('#') && line.contains('=')) {
            def parts = line.split('=', 2)
            envVars[parts[0].trim()] = parts[1].trim()
        }
    }
}

// Exportamos targetJavaVersion como una propiedad del proyecto (ext)
ext.targetJavaVersion = System.getenv('JAVA_VERSION') ?: envVars['JAVA_VERSION'] ?: '25'
