spring.application.name=sgd_hc
spring.config.import=optional:file:.env[.properties]

# ===================================================================
# 0. SERVER
# ===================================================================
server.port=${PORT:3000}

# ===================================================================
# 1. CONFIGURACIÓN BASE DE DATOS
# ===================================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sgd_hc}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver


# ===================================================================
# 2. JPA / HIBERNATE
# ===================================================================
# IMPORTANTE: usar 'none' con Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 3. FLYWAY (Migraciones de Base de Datos)
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false

# ===================================================================
# 4. JWT & SEGURIDAD
# ===================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://calm-wave-000d39410.7.azurestaticapps.net}
logging.level.org.springframework.security=TRACE

# ===================================================================
# 5. OPENAPI / SWAGGER & OTROS
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=true
ocr.service.url=http://localhost:8001

# H2 Console (Opcional, solo si usas H2 en algún momento para pruebas)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# 6. ALMACENAMIENTO DE ARCHIVOS
# ===================================================================
storage.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ===================================================================
# 7. ONLYOFFICE DOCUMENT SERVER
# ===================================================================
# URL pública del backend accesible desde OnlyOffice DS (para callback y empty-doc)
# Secreto compartido con OO DS (debe coincidir con JWT_SECRET del contenedor Docker)
# ===================================================================
# 8. CONFIGURACIÓN SEMILLA (SUPERUSER & DEFAULT)
# ===================================================================
app.seed.system.slug=${SYSTEM_SUPERUSER_SLUG:system}
app.seed.system.name=${SYSTEM_SUPERUSER_NAME:SGD Sistema Central}
app.seed.system.username=${SYSTEM_SUPERUSER_USERNAME:superuser.system}
app.seed.system.password=${SYSTEM_SUPERUSER_PASSWORD:superuser123}
app.seed.system.email=${SYSTEM_SUPERUSER_EMAIL:admin@sgd-sistema.com}
app.seed.system.firstName=${SYSTEM_SUPERUSER_FIRST_NAME:Super}
app.seed.system.lastName=${SYSTEM_SUPERUSER_LAST_NAME:User}
app.seed.system.nationalId=${SYSTEM_SUPERUSER_ID:0000000}

app.seed.default.slug=${DEFAULT_SLUG:default}
app.seed.default.name=${DEFAULT_NAME:Hospital General (Demo)}
app.seed.default.username=${DEFAULT_USERNAME:admin.default}
app.seed.default.password=${DEFAULT_PASSWORD:admin123}
app.seed.default.email=${DEFAULT_EMAIL:admin@hospital.com}
app.seed.default.firstName=${DEFAULT_ADMIN_FIRST_NAME:Admin}
app.seed.default.lastName=${DEFAULT_ADMIN_LAST_NAME:Limited}
app.seed.default.nationalId=${DEFAULT_ADMIN_ID:1111111}