spring.application.name=sgd_hc

# ===================================================================
# 1. CONFIGURACIÓN MULTI-TENANT (Bases de Datos Aisladas)
# ===================================================================

# BASE DE DATOS POR DEFECTO (Spring la usa al arrancar o si no hay Header)
spring.datasource.url=jdbc:postgresql://localhost:5432/sgd_default
spring.datasource.username=sgd_admin
spring.datasource.password=sgd_admin
spring.datasource.driver-class-name=org.postgresql.Driver

# TENANT 1: Clínica A (Propiedades personalizadas que leerás en Java)
tenants.clinica-a.url=jdbc:postgresql://localhost:5432/sgd_clinic_a
tenants.clinica-a.username=sgd_admin
tenants.clinica-a.password=sgd_admin

# TENANT 2: Clínica B
tenants.clinica-b.url=jdbc:postgresql://localhost:5432/sgd_clinic_b
tenants.clinica-b.username=sgd_admin
tenants.clinica-b.password=sgd_admin

# ===================================================================
# 2. JPA / HIBERNATE
# ===================================================================
# IMPORTANTE: usar 'none' con Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 3. FLYWAY (Migraciones de Base de Datos)
# ===================================================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# ===================================================================
# 4. JWT & SEGURIDAD
# ===================================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===================================================================
# 5. OPENAPI / SWAGGER & OTROS
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=true

# H2 Console (Opcional, solo si usas H2 en algún momento para pruebas)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console